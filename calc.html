<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual calculator</title>
    <link rel="stylesheet" href="star.css">
</head>

<body>

    <div class="bite">
        <input id="val1" type="text" placeholder="0">
        <div>
            <button style="color:chartreuse">AC</button>
            <button style="color:chartreuse">DC</button>
            <button style="color:chartreuse">%</button>
            <button style="color:chartreuse">/</button>
        </div>
        <div>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button style="color:chartreuse">*</button>
        </div>
        <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button style="color:chartreuse">-</button>
        </div>
        <div>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button style="color:chartreuse">+</button>
        </div>
        <div>
            <button>00</button>
            <button>0</button>
            <button>.</button>
            <button style="color:#ff6200">=</button>
        </div>

    </div>
    <script src="back.js"></script>


</body>

</html>
